<div nz-row>
  <div nz-col nzSpan="24">
    <nz-card
      [nzBordered]="true"
      nzTitle="Lesson Practice Questions"
      [nzExtra]="extraTemplate"
    >
      <nz-table
        [nzData]="data"
        nzSize="small"
        [nzBordered]="true"
        [nzFrontPagination]="false"
        [nzShowPagination]="false"
      >
        <thead>
          <tr>
            <th nzColumnKey="lessonname">Lesson</th>
            <th nzColumnKey="lessonpracticename">Lesson Practice</th>
            <th nzColumnKey="questionidentifier">Question</th>
            <th nzColumnKey="lessonpracticequestionorder">Order</th>
            <th nzColumnKey="">Tools</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of data; let i = index">
            <td>{{ data.lessonname }}</td>
            <td>{{ data.lessonpracticename }}</td>
            <td>
              <a [routerLink]="['/question/update/' + data.questionid,{practice:practicId}]">
              <span
                [style.text-decoration]="
                  data.lessonpracticequestionstatus ? 'none' : 'line-through'
                "
              >
                {{ data.questionidentifier }}
              </span>
             </a>
            </td>
            <td>
              {{ data.lessonpracticequestionorder }}
              <button
                *ngIf="i !== 0"
                nz-button
                nzType="text"
                nzSize="small"
                (click)="reorder(i)"
              >
                <i nz-icon nzType="arrow-up" style="color: green"></i>
              </button>
            </td>
            <td>
              <a
                nz-button
                nzDanger
                nzSize="small"
                style="margin-right: 20px"
                nz-popconfirm
                nzPopconfirmTitle="Sure to delete?"
                (nzOnConfirm)="deletequestion(data.lessonpracticequestionid)"
                *ngxPermissionsOnly="['edit_practice_question']"
                >Delete</a
              >
              <ng-template [ngxPermissionsOnly]="['edit_practice_question']">
                <a
                  *ngIf="!data.lessonpracticequestionstatus"
                  nz-button
                  nzSize="small"
                  style="margin-right: 20px; border-color: green; color: green"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to activate?"
                  (nzOnConfirm)="activatequestion(data.lessonpracticequestionid)"
                  >Activate</a
                >
                <a
                  *ngIf="data.lessonpracticequestionstatus"
                  nz-button
                  nzSize="small"
                  nzDanger
                  style="margin-right: 20px"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to deactivate?"
                  (nzOnConfirm)="
                    deactivatequestion(data.lessonpracticequestionid)
                  "
                  >Deactivate</a
                >
              </ng-template>
            </td>
          </tr>
        </tbody>
      </nz-table>
    </nz-card>
  </div>
</div>
<ng-template #extraTemplate>
  <button
    nz-button
    nzType="primary"
    (click)="showModelAddQuestion()"
    style="margin-right: 10px;"
    *ngxPermissionsOnly="['edit_practice_question']"
  >
    Create
  </button>
  <!-- <a
    nz-button
    nzType="primary"
    nzDanger
    style="width: 70px;"
    [routerLink]="['/lesson','practice']"

  >
    Back
  </a> -->
</ng-template>

<nz-modal
  [(nzVisible)]="showModalAddQuestion"
  nzTitle="Add Question"
  nzOkText="Submit"
  nzCancelText="Cancel"
  (nzOnOk)="handleModalAddQuestion()"
  (nzOnCancel)="hideModalAddQuestion()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="createForm">
      <nz-form-item>
        <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="questionid"
          >Question</nz-form-label
        >
        <nz-form-control nzExtra="Minimum 4 characters to search." nzErrorTip="Please select question!">
          <nz-select
            formControlName="questionid"
            nzPlaceHolder="Select question"
            nzAllowClear
            nzShowSearch
            nzServerSearch
            (nzOnSearch)="questioncreateonSearch($event)"
          >
          <ng-container *ngFor="let o of questionoptionList">
            <nz-option
              nzCustomContent
              *ngIf="!questionisLoading"
               [nzLabel]="o.questionid" [nzValue]="o.questionid"
            >
              {{ o.questionidentifier }}<br>
              <ng-container
                *ngIf="o.questiontags && o.questiontags.length > 0"
              >
                <nz-tag
                  [nzColor]="'cyan'"
                  *ngFor="let questiontag of o.questiontags; let i = index"
                  >{{ questiontag }}</nz-tag
                >
              </ng-container>
            </nz-option>
          </ng-container>
            <nz-option *ngIf="questionisLoading" nzDisabled nzCustomContent>
              <i nz-icon nzType="loading" class="loading-icon"></i>
              Loading Data...
            </nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonpracticequestionorder"
          >Question Order</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter question order!">
          <input
            min="1"
            max="100"
            step="1"
            type="number"
            nz-input
            formControlName="lessonpracticequestionorder"
            placeholder="Enter question order"
            (input)="validateDuplication()"
          />
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
