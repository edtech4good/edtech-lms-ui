<div nz-row>
  <div nz-col nzSpan="24">
    <nz-card
      [nzBordered]="true"
      nzTitle="Lesson Practice"
      [nzExtra]="extraTemplate"
      [nzLoading]="dataloading"
    >
      <nz-table
        [nzData]="data"
        nzSize="small"
        [nzBordered]="true"
        [nzFrontPagination]="false"
        [nzShowPagination]="false"
      >
        <thead>
          <tr>
            <th nzColumnKey="lessonpracticename`">Practice Name</th>
            <th nzColumnKey="lessonpracticedescription">
              Practice Description
            </th>
            <th nzColumnKey="lessonname">Lesson</th>
            <th nzColumnKey="lessonpracticeorder">Order</th>
            <th nzColumnKey="">Tools</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of data; let i = index">
            <td>
              <span
                [style.text-decoration]="
                  data.lessonpracticestatus ? 'none' : 'line-through'
                "
                >{{ data.lessonpracticename }}</span
              >
            </td>
            <td>
              <span
                [style.text-decoration]="
                  data.lessonpracticestatus ? 'none' : 'line-through'
                "
                >{{ data.lessonpracticedescription }}</span
              >
            </td>
            <td>
              <span
                [style.text-decoration]="
                  data.lessonpracticestatus ? 'none' : 'line-through'
                "
              >
                {{ data.lessonname }}
              </span>
            </td>


            <td>
              {{ data.lessonpracticeorder }}
              <button
                *ngIf="i !== 0"
                nz-button
                nzType="text"
                nzSize="small"
                (click)="reorder(i)"
              >
                <i nz-icon nzType="arrow-up" style="color: green"></i>
              </button>
            </td>
            <td>
              <a
                nz-button
                nzDanger
                nzSize="small"
                style="margin-right: 20px"
                nz-popconfirm
                nzPopconfirmTitle="Sure to delete?"
                (nzOnConfirm)="deletepractice(data.lessonpracticeid)"
                *ngxPermissionsOnly="['delete_lessonpractice']"
                >Delete</a
              >
              <ng-template [ngxPermissionsOnly]="['deactivate_lessonpractice']">
                <a
                  *ngIf="!data.lessonpracticestatus"
                  nz-button
                  nzSize="small"
                  style="margin-right: 20px; border-color: green; color: green"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to activate?"
                  (nzOnConfirm)="activatepractice(data.lessonpracticeid)"
                  >Activate</a
                >
                <a
                  *ngIf="data.lessonpracticestatus"
                  nz-button
                  nzSize="small"
                  nzDanger
                  style="margin-right: 20px"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to deactivate?"
                  (nzOnConfirm)="deactivatepractice(data.lessonpracticeid)"
                  >Deactivate</a
                >
                <a
                  nz-button
                  nzType="primary"
                  nzSize="small"
                  style="margin-right: 20px"
                  (click)="showModelUpdatePractice(data.lessonpracticeid)"
                  >Edit</a
                >
              </ng-template>
              <a
                nz-button
                [routerLink]="[
                  '/lesson',
                  'practice',
                  'question',
                  data.lessonpracticeid,
                ]"
                nzType="primary"
                nzSize="small"
                *ngxPermissionsOnly="['edit_practice_question']"
                >Questions</a
              >
            </td>
          </tr>
        </tbody>
      </nz-table>
    </nz-card>
  </div>
</div>
<ng-template #extraTemplate>
  <button
    nz-button nzType="primary"
    (click)="showModelAddPractice()"
    style="margin-right: 10px;"
    *ngxPermissionsOnly="['create_lessonpractice']"
  >
    Create
  </button>
  <!-- <button
    nz-button
    style="float: right; width: 70px;"
    type="button"
    [nzType]="'primary'"
    [routerLink]="['/lesson','index']"
    nzDanger
  >
    Back
  </button> -->
</ng-template>

<nz-modal
  [nzWidth]="'calc(50vw)'"
  [(nzVisible)]="showModalAddPractice"
  [nzTitle]="!isUpdateLessonPractice ? 'Add Practice' : 'Update Practice'"
  nzOkText="Submit"
  nzCancelText="Cancel"
  (nzOnOk)="handleModalPractice()"
  (nzOnCancel)="hideModalAddPractice()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="createForm">
      <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonpracticename"
          >Practice Name</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter practice name!">
          <grammarly-editor-plugin>
            <input
              nz-input
              formControlName="lessonpracticename"
              placeholder="Enter practice name"
            />
          </grammarly-editor-plugin>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonpracticedescription"
          >Practice Description</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter practice description!">
          <grammarly-editor-plugin>
            <textarea
              nz-input
              formControlName="lessonpracticedescription"
              placeholder="Enter practice description"
              rows="5"
              style="resize: none"
            >
            </textarea>
          </grammarly-editor-plugin>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item *ngIf="!isUpdateLessonPractice">
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonpracticeorder"
          >Practice Order</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter practice order!">
            <input
            min="1"
            max="100"
            step="1"
            type="number"
            nz-input
            formControlName="lessonpracticeorder"
            placeholder="Enter practice order"
            (input)="validateDuplication()"
          />
        </nz-form-control>
      </nz-form-item>
      <!-- <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="points"
          >Pracitce Points</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter practice point!">
            <input
            min="1"
            step="1"
            type="number"
            nz-input
            formControlName="points"
            placeholder="Enter practice points"
          />
        </nz-form-control>
      </nz-form-item> -->
      <input hidden formControlName="lessonpracticeid" />
    </form>
  </ng-container>
</nz-modal>
