<div nz-row>
  <div nz-col nzSpan="24">
    <nz-card
      [nzBordered]="true"
      nzTitle="Lesson Quiz"
      [nzExtra]="extraTemplate"
      [nzLoading]="dataloading"
    >
      <nz-table
        [nzData]="data"
        nzSize="small"
        [nzBordered]="true"
        [nzFrontPagination]="false"
        [nzShowPagination]="false"
      >
        <thead>
          <tr>
            <th nzColumnKey="lessonquizname`">Quiz Name</th>
            <th nzColumnKey="lessonquizdescription">Quiz Description</th>
            <th nzColumnKey="lessonname">Lesson</th>
            <th nzColumnKey="lessonquizorder">Order</th>
            <th nzColumnKey="">Tools</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of data; let i = index">
            <td>
              <span
                [style.text-decoration]="
                  data.lessonquizstatus ? 'none' : 'line-through'
                "
                >{{ data.lessonquizname }}</span
              >
            </td>
            <td>
              <span
                [style.text-decoration]="
                  data.lessonquizstatus ? 'none' : 'line-through'
                "
                >{{ data.lessonquizdescription }}</span
              >
            </td>
            <td>
              <span
                [style.text-decoration]="
                  data.lessonquizstatus ? 'none' : 'line-through'
                "
              >
                {{ data.lessonname }}
              </span>
            </td>

            <td>
              {{ data.lessonquizorder }}
              <button
                *ngIf="i !== 0"
                nz-button
                nzType="text"
                nzSize="small"
                (click)="reorder(i)"
              >
                <i nz-icon nzType="arrow-up" style="color: green"></i>
              </button>
            </td>
            <td>
              <a
                nz-button
                nzDanger
                nzSize="small"
                style="margin-right: 20px"
                nz-popconfirm
                nzPopconfirmTitle="Sure to delete?"
                (nzOnConfirm)="deletequiz(data.lessonquizid)"
                *ngxPermissionsOnly="['delete_lessonquiz']"
                >Delete</a
              >
              <ng-template [ngxPermissionsOnly]="['deactivate_lessonquiz']">
                <a
                  *ngIf="!data.lessonquizstatus"
                  nz-button
                  nzSize="small"
                  style="margin-right: 20px; border-color: green; color: green"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to activate?"
                  (nzOnConfirm)="activatequiz(data.lessonquizid)"
                  >Activate</a
                >
                <a
                  *ngIf="data.lessonquizstatus"
                  nz-button
                  nzSize="small"
                  nzDanger
                  style="margin-right: 20px"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to deactivate?"
                  (nzOnConfirm)="deactivatequiz(data.lessonquizid)"
                  >Deactivate</a
                >
                <a
                  nz-button
                  nzType="primary"
                  nzSize="small"
                  style="margin-right: 20px"
                  (click)="showModelUpdateQuiz(data.lessonquizid)"
                  >Edit</a
                >
              </ng-template>
              <a
                nz-button
                [routerLink]="[
                  '/lesson',
                  'quiz',
                  'question',
                  data.lessonquizid
                ]"
                nzType="primary"
                nzSize="small"
                *ngxPermissionsOnly="['edit_quiz_question']"
                >Questions</a
              >
            </td>
          </tr>
        </tbody>
      </nz-table>
    </nz-card>
  </div>
</div>
<ng-template #extraTemplate>
  <button
    nz-button
    nzType="primary"
    (click)="showModelAddQuiz()"
    style="margin-right: 10px;"
    *ngxPermissionsOnly="['create_lessonquiz']"
  >
    Create
  </button>
  <!-- <button
    nz-button
    style="float: right; width: 70px;"
    type="button"
    [nzType]="'primary'"
    [routerLink]="['/lesson', 'index']"
    nzDanger
  >
    Back
  </button> -->
</ng-template>

<nz-modal
  [nzWidth]="'calc(50vw)'"
  [(nzVisible)]="showModalAddQuiz"
  [nzTitle]="!isUpdateLessonQuiz ? 'Add Quiz' : 'Update Quiz'"
  nzOkText="Submit"
  nzCancelText="Cancel"
  (nzOnOk)="handleModalQuiz()"
  (nzOnCancel)="hideModalAddQuiz()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="createForm">
      <nz-form-item>
        <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="lessonquizname"
          >Quiz Name</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter quiz name!">
          <grammarly-editor-plugin>
            <input
              nz-input
              formControlName="lessonquizname"
              placeholder="Enter quiz name"
            />
          </grammarly-editor-plugin>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonquizdescription"
          >Quiz Description</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter quiz description!">
          <grammarly-editor-plugin>
            <textarea
              nz-input
              formControlName="lessonquizdescription"
              placeholder="Enter quiz description"
              rows="5"
              style="resize: none"
            >
            </textarea>
          </grammarly-editor-plugin>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item *ngIf="!isUpdateLessonQuiz">
        <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="lessonquizorder"
          >Quiz Order</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter quiz order!">
          <input
            min="1"
            max="100"
            step="1"
            type="number"
            nz-input
            formControlName="lessonquizorder"
            placeholder="Enter quiz order"
            (input)="validateDuplication()"

          />
        </nz-form-control>
      </nz-form-item>
      <!-- <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="points"
          >Quiz Points</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter quiz points!">
            <input
            min="1"
            step="1"
            type="number"
            nz-input
            formControlName="points"
            placeholder="Enter quiz points"
          />
        </nz-form-control>
      </nz-form-item> -->
      <input hidden formControlName="lessonquizid" />
    </form>
  </ng-container>
</nz-modal>
