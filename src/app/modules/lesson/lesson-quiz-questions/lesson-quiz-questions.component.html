<div nz-row>
  <div nz-col nzSpan="24">
    <nz-card
      [nzBordered]="true"
      nzTitle="Lesson Quiz Questions"
      [nzExtra]="extraTemplate"
      [nzLoading]="dataloading"
    >
      <nz-table
        [nzData]="data"
        nzSize="small"
        [nzBordered]="true"
        [nzFrontPagination]="false"
        [nzShowPagination]="false"
      >
        <thead>
          <tr>
            <th nzColumnKey="lessonname">Lesson</th>
            <th nzColumnKey="lessonquizname">Lesson Quiz</th>
            <th nzColumnKey="questionidentifier">Question</th>
            <th nzColumnKey="lessonquizquestionorder">Order</th>
            <th nzColumnKey="">Tools</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of data; let i = index">
            <td>{{ data.lessonname }}</td>
            <td>{{ data.lessonquizname }}</td>
            <td>
              <a [routerLink]="['/question/update/' + data.questionid,{link:quizId}]">
                <span
                  [style.text-decoration]="
                    data.lessonquizquestionstatus ? 'none' : 'line-through'
                  "
                >
                  {{ data.questionidentifier }}
                </span>
              </a>
            </td>
            <td>
              {{ data.lessonquizquestionorder }}
              <button
                *ngIf="i !== 0"
                nz-button
                nzType="text"
                nzSize="small"
                (click)="reorder(i)"
              >
                <i nz-icon nzType="arrow-up" style="color: green"></i>
              </button>
            </td>
            <td>
              <a
                nz-button
                nzDanger
                nzSize="small"
                style="margin-right: 20px"
                nz-popconfirm
                nzPopconfirmTitle="Sure to delete?"
                (nzOnConfirm)="deletequestion(data.lessonquizquestionid)"
                *ngxPermissionsOnly="['edit_quiz_question']"
                >Delete</a
              >
              <ng-template [ngxPermissionsOnly]="['edit_quiz_question']">
                <a
                  *ngIf="!data.lessonquizquestionstatus"
                  nz-button
                  nzSize="small"
                  style="margin-right: 20px; border-color: green; color: green"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to activate?"
                  (nzOnConfirm)="activatequestion(data.lessonquizquestionid)"
                  >Activate</a
                >
                <a
                  *ngIf="data.lessonquizquestionstatus"
                  nz-button
                  nzSize="small"
                  nzDanger
                  style="margin-right: 20px"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to deactivate?"
                  (nzOnConfirm)="deactivatequestion(data.lessonquizquestionid)"
                  >Deactivate</a
                >
              </ng-template>
            </td>
          </tr>
        </tbody>
      </nz-table>
    </nz-card>
  </div>
</div>
<ng-template #extraTemplate>
  <button nz-button nzType="primary" (click)="showModelAddQuestion()" *ngxPermissionsOnly="['edit_quiz_question']">
    Create
  </button>
</ng-template>

<nz-modal
  [(nzVisible)]="showModalAddQuestion"
  nzTitle="Add Question"
  nzOkText="Submit"
  nzCancelText="Cancel"
  (nzOnOk)="handleModalAddQuestion()"
  (nzOnCancel)="hideModalAddQuestion()"
>
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="createForm">
      <nz-form-item>
        <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="questionid"
          >Question</nz-form-label
        >
        <nz-form-control
          nzExtra="Minimum 4 characters to search."
          nzErrorTip="Please select question!"
        >
          <nz-select
            formControlName="questionid"
            nzPlaceHolder="Select question"
            nzAllowClear
            nzShowSearch
            nzServerSearch
            (nzOnSearch)="questioncreateonSearch($event)"
          >
            <ng-container *ngFor="let o of questionoptionList">
              <nz-option
                nzCustomContent
                *ngIf="!questionisLoading"
                [nzLabel]="o.questionid"
                [nzValue]="o.questionid"
              >
                {{ o.questionidentifier }}
                <ng-container
                  *ngIf="o.questiontags && o.questiontags.length > 0"
                >
                  <nz-tag
                    [nzColor]="'cyan'"
                    *ngFor="let questiontag of o.questiontags; let i = index"
                    >{{ questiontag }}</nz-tag
                  >
                </ng-container>
              </nz-option>
            </ng-container>
            <nz-option *ngIf="questionisLoading" nzDisabled nzCustomContent>
              <i nz-icon nzType="loading" class="loading-icon"></i>
              Loading Data...
            </nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label
          [nzSm]="6"
          [nzXs]="24"
          nzRequired
          nzFor="lessonquizquestionorder"
          >Question Order</nz-form-label
        >
        <nz-form-control nzErrorTip="Please enter question order!">
          <input
            min="1"
            max="100"
            step="1"
            type="number"
            nz-input
            formControlName="lessonquizquestionorder"
            (input)="validateDuplication()"
            placeholder="Enter question order"
          />
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
