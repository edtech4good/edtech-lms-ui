<div nz-row>
  <div nz-col nzSpan="12">
    <nz-card [nzBordered]="true" nzTitle="Grade" [nzLoading]="dataloading">
      <form nz-form [formGroup]="editForm">
        <nz-form-item>
          <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="curriculumid"
            >Curriculumid</nz-form-label
          >
          <nz-form-control nzErrorTip="Please select curriculum!">
            <nz-select
              formControlName="curriculumid"
              nzPlaceHolder="Select curriculum"
            >
              <nz-option
                *ngFor="let option of curriculums"
                [nzLabel]="option.curriculumname"
                [nzValue]="option.curriculumid"
              ></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="gradename"
            >Grade Name</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter grade name!">
            <grammarly-editor-plugin>
              <input
                type="text"
                nz-input
                formControlName="gradename"
                placeholder="Enter grade name"
                (input)="restrictSpecialCharecter()"
              />
            </grammarly-editor-plugin>
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="gradeorder"
            >Grade Order</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter grade order!">
            <input
              min="1"
              max="100"
              step="1"
              type="number"
              nz-input
              formControlName="gradeorder"
              placeholder="Enter grade order"
            />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label
            [nzSm]="6"
            [nzXs]="24"
            nzFor="gradedescription"
            >Grade Description</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter grade description!">
            <grammarly-editor-plugin>
              <textarea
                maxlength="200"
                type="text"
                nz-input
                formControlName="gradedescription"
                placeholder="Enter grade description"
                style="resize: none"
                rows="5"
              >
              </textarea>
            </grammarly-editor-plugin>
          </nz-form-control>
        </nz-form-item>
        <!-- <nz-form-item>
          <nz-form-label [nzSm]="12" [nzXs]="24" nzRequired nzFor="passing_points"
            >Unlocking Next Grade Points</nz-form-label
          >
          <nz-form-control nzErrorTip="Please enter grade unlockingpoints!">
            <input
              min="1"
              step="1"
              type="number"
              nz-input
              formControlName="passing_points"
              placeholder="Enter grade unlockingoints"
            />
          </nz-form-control>
        </nz-form-item> -->
        <button
          nz-button
          style="float: right"
          type="button"
          [nzType]="'primary'"
          (click)="submiteditForm()"
        >
          Submit
        </button>
      </form>
    </nz-card>
  </div>
</div>
