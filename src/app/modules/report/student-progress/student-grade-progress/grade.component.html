<div nz-row>
  <div nz-col nzSpan="24">
    <nz-card [nzBordered]="true" nzTitle="Course Progress">
      <nz-table
        nzShowSizeChanger
        [nzLoading]="dataloading"
        [nzData]="data"
        [nzFrontPagination]="false"
        nzSize="small"
        [nzTotal]="total"
        [nzPageSize]="pageSize"
        [nzPageIndex]="pageIndex"
        [nzHideOnSinglePage]="true"
        [nzBordered]="true"
        [nzPageSizeOptions]="[100, 500]"
        [nzScroll]="{ y: '640px' }"
        (nzQueryParams)="onQueryParamsChange($event)"
        [nzShowTotal]="totalTemplate"
      >
        <thead>
          <tr>
            <th nzColumnKey="Curriculum">Curriculum</th>
            <th nzColumnKey="">Grade</th>
            <th nzColumnKey="">Student Name</th>
            <th nzColumnKey="">Progress</th>
            <th nzColumnKey="">Scores</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of studentgradeprogress$ | async">
            <td>{{ data.grade?.curriculum?.curriculumname }}</td>
            <td>{{ data.grade?.gradename }}</td>
            <td>{{ data.studentfirstname ?? "N/A" }}</td>
            <td class="progress-padding">
              <nz-progress
                [nzPercent]="data.studentgradesprogresses[0]?.progress ?? 0"
                nzSize="small"
              ></nz-progress>
            </td>
            <td>{{ data.studentgradesprogresses[0]?.scores ?? 0 }}</td>
          </tr>
        </tbody>
      </nz-table>
    </nz-card>
  </div>
</div>
<ng-template #totalTemplate> Total : {{ total }} </ng-template>
