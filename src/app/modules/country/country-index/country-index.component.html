<div nz-row>
    <div nz-col nzSpan="24">
      <nz-card [nzBordered]="true" nzTitle="Countries" [nzExtra]="extraTemplate">
        <nz-table
          nzShowSizeChanger
          [nzLoading]="dataloading"
          [nzData]="data"
          [nzFrontPagination]="false"
          nzSize="small"
          [nzTotal]="total"
          [nzPageSize]="pageSize"
          [nzPageIndex]="pageIndex"
          [nzHideOnSinglePage]="true"
          [nzBordered]="true"
          [nzPageSizeOptions]="[100, 500]"
          [nzScroll]="{ y: '640px' }"
          (nzQueryParams)="onQueryParamsChange($event)"
          [nzShowTotal]="totalTemplate"
        >
          <thead>
            <tr>
              <th nzColumnKey="countryname" nzCustomFilter>
                Country Name
                <nz-filter-trigger
                  [(nzVisible)]="visible"
                  [nzActive]="searchValue.length > 0"
                  [nzDropdownMenu]="menu"
                >
                  <i nz-icon nzType="search"></i>
                </nz-filter-trigger>
              </th>
              <th nzColumnKey="">Expected Usage</th>
              <th nzColumnKey="">Tools</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of data">
              <td>{{ data.countryname }}</td>
              <td>{{ data.expectedusage ? data.expectedusage + ' min' : '' }}</td>
              <td>
                <a
                  nz-button
                  nzDanger
                  nzSize="small"
                  style="margin-right: 20px"
                  nz-popconfirm
                  nzPopconfirmTitle="Sure to delete?"
                  (nzOnConfirm)="deletetag(data.countryid)"
                  *ngxPermissionsOnly="['delete_country']"
                  >Delete</a
                >
                <a
                  nz-button
                  [routerLink]="['/country', 'update', data.countryid]"
                  nzType="primary"
                  nzSize="small"
                  *ngxPermissionsOnly="['update_country']"
                  >Edit</a
                >
              </td>
            </tr>
          </tbody>
        </nz-table>
      </nz-card>
      <ng-template #extraTemplate>
        <a nz-button routerLink="/country/create" nzType="primary" *ngxPermissionsOnly="['create_country']">Create</a>
      </ng-template>
      <nz-dropdown-menu #menu="nzDropdownMenu">
        <div class="ant-table-filter-dropdown">
          <div class="search-box">
            <input
              type="text"
              nz-input
              placeholder="Search country"
              [(ngModel)]="searchValue"
            />
            <button
              nz-button
              nzSize="small"
              nzType="primary"
              (click)="search()"
              class="search-button"
            >
              Search
            </button>
            <button nz-button nzSize="small" (click)="reset()">Reset</button>
          </div>
        </div>
      </nz-dropdown-menu>
    </div>
  </div>
  <ng-template #totalTemplate> Total : {{ total }} </ng-template>
